[binaries]
c = 'C:/Program Files/LLVM/bin/clang.exe'
cpp = 'C:/Program Files/LLVM/bin/clang++.exe'
ar = 'C:/Program Files/LLVM/bin/llvm-ar.exe'
strip = 'C:/Program Files/LLVM/bin/llvm-strip.exe'

[host_machine]
system = 'openox'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'

[built-in options]
c_args = ['--target=i686-pc-windows-msvc', '-ffreestanding', '-fno-exceptions', '-fno-rtti', '-fno-stack-protector']
cpp_args = ['--target=i686-pc-windows-msvc', '-ffreestanding', '-fno-exceptions', '-fno-rtti', '-fno-stack-protector', '-std=c++23',
    '-D__GCC_ATOMIC_BOOL_LOCK_FREE=2', '-D__GCC_ATOMIC_CHAR_LOCK_FREE=2', '-D__GCC_ATOMIC_CHAR8_T_LOCK_FREE=2',
    '-D__GCC_ATOMIC_CHAR16_T_LOCK_FREE=2', '-D__GCC_ATOMIC_CHAR32_T_LOCK_FREE=2', '-D__GCC_ATOMIC_WCHAR_T_LOCK_FREE=2',
    '-D__GCC_ATOMIC_SHORT_LOCK_FREE=2', '-D__GCC_ATOMIC_INT_LOCK_FREE=2', '-D__GCC_ATOMIC_LONG_LOCK_FREE=2',
    '-D__GCC_ATOMIC_LLONG_LOCK_FREE=2', '-D__GCC_ATOMIC_POINTER_LOCK_FREE=2', '-D__GCC_ATOMIC_TEST_AND_SET_TRUEVAL=1',
    '-D__MLIBC_POSIX2024']
c_link_args = ['--target=i686-pc-windows-msvc', '-fuse-ld=lld-link']
cpp_link_args = ['--target=i686-pc-windows-msvc', '-fuse-ld=lld-link']
